title: Credential Dumping Attempt
id: scarlet-auth-005
status: stable
description: Detects processes associated with credential dumping activity
author: SecurityScarletAI
date: 2026/05/03
logsource:
    category: process
detection:
    selection_mimikatz:
        process_name|contains: mimikatz
    selection_procdump:
        process_name: procdump
    selection_lazagne:
        process_name|contains: lazagne
    selection_keychain_dump:
        process_name: security
        process_cmdline|contains: dump-keychain
    selection_chpasswd:
        process_name: chpasswd
    condition: selection_mimikatz or selection_procdump or selection_lazagne or selection_keychain_dump or selection_chpasswd
level: critical
tags:
    - attack.credential_access
    - attack.ta0006
    - attack.t1003