title: SSH Brute Force Detected
id: scarlet-001
status: stable
description: Detects multiple failed SSH login attempts from the same source IP, indicating a brute force attack
author: SecurityScarletAI
date: 2026/03/21
logsource:
    category: authentication
detection:
    selection:
        event_type: start
        event_action|contains: failed
    condition: selection | count(source_ip) by host_name > 5
timeframe: 5m
level: high
tags:
    - attack.credential_access
    - attack.ta0006
    - attack.t1110