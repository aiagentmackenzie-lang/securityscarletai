title: SSH Successful Login After Multiple Failures
id: scarlet-auth-008
status: stable
description: Detects a successful SSH login following multiple failed attempts from the same source — likely a brute force success
author: SecurityScarletAI
date: 2026/05/03
logsource:
    category: authentication
detection:
    selection_failed:
        event_action|contains: failed
        source_ip: '*'
    selection_success:
        event_action|contains: success
        event_action|contains: ssh
    condition: selection_failed | count(*) by source_ip > 3 and selection_success
timeframe: 10m
level: critical
tags:
    - attack.credential_access
    - attack.ta0006
    - attack.t1110