title: Login from Unusual Geography
id: d0f298b8-4905-5786-a5a0-b5b1d5f54528
status: experimental
description: Detects successful authentication from an IP address that does not match expected geographic patterns
author: SecurityScarletAI
date: 2026/05/03
logsource:
    category: authentication
detection:
    selection:
        event_action|contains: success
        source_ip: '*'
    filter_internal:
        source_ip|startswith:
            - '10.'
            - '192.168.'
            - '172.16.'
            - '172.17.'
            - '172.18.'
            - '172.19.'
            - '172.2'
            - '172.3'
    condition: selection and not filter_internal
level: medium
tags:
    - attack.initial_access
    - attack.ta0001
    - attack.t1078