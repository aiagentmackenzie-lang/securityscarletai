title: Download and Execute Pattern
id: eadadef7-7384-51f3-821e-e08167884a29
status: stable
description: Detects download-then-execute patterns commonly used by malware droppers
author: SecurityScarletAI
date: 2026/05/03
logsource:
    category: process
detection:
    selection_curl_exec:
        process_name: bash
        process_cmdline|contains:
            - curl
            - sh
    selection_wget_exec:
        process_name: bash
        process_cmdline|contains:
            - wget
            - sh
    selection_powershell_download:
        process_name: python
        process_cmdline|contains:
            - urllib
            - exec
    condition: selection_curl_exec or selection_wget_exec or selection_powershell_download
level: high
tags:
    - attack.execution
    - attack.ta0002
    - attack.t1059