title: Bulk Data Download
id: b4b4d4b1-3499-5f44-aaa6-542c05d16fb5
status: stable
description: Detects unusually large data downloads that may indicate data exfiltration from cloud services
author: SecurityScarletAI
date: 2026/05/03
logsource:
    category: network
detection:
    selection:
        event_type: start
        event_action|contains: download
    condition: selection | count(*) by user_name > 5
timeframe: 10m
level: medium
tags:
