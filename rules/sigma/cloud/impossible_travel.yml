title: Impossible Travel - Distant Logins
id: a015f417-c79e-52c1-a411-dd65cdbd46b6
status: stable
description: Detects authentication from two geographically distant locations within an impossible time window (correlation-based detection)
author: SecurityScarletAI
date: 2026/05/03
logsource:
    category: authentication
detection:
    selection:
        event_action|contains: success
        source_ip: '*'
    condition: selection | count(*) by user_name > 2
timeframe: 30m
level: critical
tags:
