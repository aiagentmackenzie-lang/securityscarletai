title: Sensitive File Access
id: 89097fa4-defb-5d5d-b794-0c3e218f9e6b
status: stable
description: Detects access to sensitive system files like /etc/shadow, .ssh directories, and private keys
author: SecurityScarletAI
date: 2026/05/03
logsource:
    category: process
detection:
    selection_shadow:
        file_path|contains: /etc/shadow
    selection_ssh:
        file_path|contains: .ssh/id_rsa
    selection_ssh_keys:
        file_path|contains: .ssh/authorized_keys
    selection_kerberos:
        file_path|contains: /etc/krb5.keytab
    selection_hosts:
        file_path|contains: /etc/hosts
        event_action|contains: modification
    condition: selection_shadow or selection_ssh or selection_ssh_keys or selection_kerberos or selection_hosts
level: high
tags:
    - attack.credential_access
    - attack.ta0006
    - attack.t1003