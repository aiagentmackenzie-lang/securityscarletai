name: CI

on:
  push:
    branches: [main, polish-and-docs]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: scarletai
          POSTGRES_USER: scarletai
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install

      - name: Lint
        # Full pyproject config (E,F,W,I,S,B with S608/B008 ignored).
        # Gates the product code (src + dashboard); tests/scripts/alembic are
        # tooling and linted separately if desired.
        run: poetry run ruff check src/ dashboard/

      - name: Type check
        # Pragmatic mypy config (see [tool.mypy] in pyproject.toml). Not
        # `strict` — strict produced 336 unenforced errors (a false signal).
        # This config is actually green; tighten incrementally over time.
        run: poetry run mypy src

      - name: Unit tests
        run: poetry run pytest tests/unit/ -q
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
          API_BEARER_TOKEN: ${{ secrets.API_BEARER_TOKEN }}

      - name: Coverage
        run: poetry run pytest tests/ --cov=src --cov-fail-under=80 --tb=short -q
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
          API_BEARER_TOKEN: ${{ secrets.API_BEARER_TOKEN }}