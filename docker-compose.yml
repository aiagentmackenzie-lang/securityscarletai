services:
  postgres:
    image: postgres:17-alpine
    platform: linux/arm64
    container_name: scarletai-db
    environment:
      POSTGRES_USER: scarletai
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: scarletai
    ports:
      # Port 5433 to avoid conflict with Homebrew PostgreSQL on macOS
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scarletai -d scarletai"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    # Epic 4: Redis service for rate-limit storage and JWT blocklist.
    # 6379 inside the compose network; not exposed to host by default.
    image: redis:7-alpine
    platform: linux/arm64
    container_name: scarletai-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    container_name: scarletai-api
    # Epic 7: run the entrypoint that waits for DB, applies schema, seeds, trains, then execs uvicorn.
    command: ["/app/scripts/entrypoint.sh"]
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: scarletai
      DB_USER: scarletai
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      API_SECRET_KEY: ${API_SECRET_KEY:?Set API_SECRET_KEY in .env}
      API_BEARER_TOKEN: ${API_BEARER_TOKEN:?Set API_BEARER_TOKEN in .env}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost:8501}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral:7b}
    volumes:
      # Epic 7: persist model artifacts and runtime data across restarts.
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Longer start-period: the entrypoint runs schema apply + optional seed + model
      # training on first launch, which can take 30-60 seconds.
      test: ["CMD", "curl", "-f", "--max-time", "5", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped  # M-18: restart policy added

volumes:
  pgdata:
  redisdata:
