version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    platform: linux/arm64
    container_name: scarletai-db
    environment:
      POSTGRES_USER: scarletai
      POSTGRES_PASSWORD: ${DB_PASSWORD:-scarletai_secure_2026}
      POSTGRES_DB: scarletai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scarletai -d scarletai"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    platform: linux/arm64
    container_name: scarletai-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
