services:
  postgres:
    image: postgres:17-alpine
    platform: linux/arm64
    container_name: scarletai-db
    environment:
      POSTGRES_USER: scarletai
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: scarletai
    ports:
      # Port 5433 to avoid conflict with Homebrew PostgreSQL on macOS
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scarletai -d scarletai"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: scarletai-api
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: scarletai
      DB_USER: scarletai
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      API_SECRET_KEY: ${API_SECRET_KEY}
      API_BEARER_TOKEN: ${API_BEARER_TOKEN}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral:7b}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped  # M-18: restart policy added

volumes:
  pgdata:
